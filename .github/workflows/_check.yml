name: check

# Reusable: one slot check for a single target. Called by monitor-*.yml.
on:
  workflow_call:
    inputs:
      clinic_url:
        type: string
        required: true
      target_label:
        type: string
        required: true
      state_key:
        type: string
        required: true
      ignore_window:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install
        run: |
          pip install .
          python -m playwright install --with-deps chromium

      # Restore this target's "already notified" state from the previous run.
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: ${{ inputs.state_key }}-${{ github.run_id }}
          restore-keys: |
            ${{ inputs.state_key }}-

      # Cron can't be randomised, so scatter within the window.
      - name: Random delay
        run: sleep $(( RANDOM % 180 ))

      - name: Check for slots
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLINIC_URL: ${{ inputs.clinic_url }}
          TARGET_LABEL: ${{ inputs.target_label }}
          MONITOR_TZ: Europe/Berlin
          WINDOW_START: "08:00"
          WINDOW_END: "21:00"
          STATE_PATH: state.json
          CAPTURE_DIR: captures
        run: clinic-monitor check ${{ inputs.ignore_window && '--ignore-window' || '' }}

      - name: Upload captures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: captures-${{ inputs.state_key }}-${{ github.run_id }}
          path: captures/
          if-no-files-found: ignore
          retention-days: 14

      - name: Save state
        if: always()
        run: |
          test -f state.json || echo '{"seen": []}' > state.json
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: ${{ inputs.state_key }}-${{ github.run_id }}
